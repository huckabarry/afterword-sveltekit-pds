name: Photo Sync

on:
  schedule:
    - cron: '11,41 * * * *'
  workflow_dispatch:

jobs:
  sync-photos:
    runs-on: ubuntu-latest
    steps:
      - name: Sync next photo batch
        env:
          PHOTO_SYNC_TOKEN: ${{ secrets.PHOTO_SYNC_TOKEN }}
        run: |
          if [ -z "$PHOTO_SYNC_TOKEN" ]; then
            echo "Missing PHOTO_SYNC_TOKEN GitHub secret"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $PHOTO_SYNC_TOKEN" \
            "https://afterword.blog/internal/photos-sync?limit=12"
