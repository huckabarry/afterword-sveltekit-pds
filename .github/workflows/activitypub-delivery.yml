name: ActivityPub Delivery

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  deliver-missing:
    runs-on: ubuntu-latest
    steps:
      - name: Deliver missing ActivityPub blog posts
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          if [ -z "$ADMIN_API_TOKEN" ]; then
            echo "Missing ADMIN_API_TOKEN GitHub secret"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $ADMIN_API_TOKEN" \
            "https://afterword.blog/ap/admin/deliver-missing?limit=10"

      - name: Deliver missing ActivityPub status posts
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          if [ -z "$ADMIN_API_TOKEN" ]; then
            echo "Missing ADMIN_API_TOKEN GitHub secret"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $ADMIN_API_TOKEN" \
            "https://afterword.blog/ap/admin/deliver-missing-statuses?limit=20"
