name: ActivityPub Delivery

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  deliver-missing:
    runs-on: ubuntu-latest
    steps:
      - name: Deliver missing ActivityPub posts
        env:
          ACTIVITYPUB_DELIVERY_TOKEN: ${{ secrets.ACTIVITYPUB_DELIVERY_TOKEN }}
        run: |
          if [ -z "$ACTIVITYPUB_DELIVERY_TOKEN" ]; then
            echo "Missing ACTIVITYPUB_DELIVERY_TOKEN GitHub secret"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $ACTIVITYPUB_DELIVERY_TOKEN" \
            "https://afterword.blog/ap/admin/deliver-missing?limit=10"
